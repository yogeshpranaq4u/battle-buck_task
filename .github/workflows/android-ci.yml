name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build + Unit Tests
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Run checks
        run: ./gradlew :app:compileDebugKotlin :app:lintDebug :leaderboard-core:test :score-engine:test
